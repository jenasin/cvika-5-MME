<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMM1 - Statistiky | Cvičení 5</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            color: #333;
            min-height: 100vh;
        }
        .container { max-width: 960px; margin: 0 auto; padding: 20px; }
        header {
            background: linear-gradient(135deg, #2d5016, #4a8c2a);
            color: white;
            padding: 30px 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        header h1 { font-size: 1.6em; margin-bottom: 6px; }
        header p { opacity: 0.9; font-size: 0.95em; }
        .nav-links { text-align: center; margin-bottom: 20px; }
        .nav-links a {
            color: #4a8c2a; text-decoration: none; font-weight: 600; font-size: 0.95em;
            padding: 8px 16px; border: 2px solid #4a8c2a; border-radius: 8px;
            transition: all 0.2s; margin: 0 6px;
        }
        .nav-links a:hover { background: #4a8c2a; color: white; }
        .card {
            background: white; border-radius: 12px; padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 20px;
        }
        .card h2 {
            font-size: 1.2em; color: #2d5016; margin-bottom: 16px;
            border-bottom: 2px solid #e8f5d8; padding-bottom: 8px;
        }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 14px; margin-bottom: 8px;
        }
        .stat-box {
            background: #f7f9fb; border-radius: 10px; padding: 18px;
            text-align: center; border: 2px solid #e0e6ed;
        }
        .stat-box .stat-value { font-size: 2em; font-weight: 700; color: #2d5016; }
        .stat-box .stat-label { font-size: 0.82em; color: #666; margin-top: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.92em; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #e0e6ed; }
        th { background: #f0f4f8; font-weight: 600; color: #2d5016; position: sticky; top: 0; }
        tr:hover td { background: #f7f9fb; }
        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 12px;
            font-size: 0.85em; font-weight: 600;
        }
        .badge-great { background: #d4edda; color: #155724; }
        .badge-ok { background: #fff3cd; color: #856404; }
        .badge-bad { background: #f8d7da; color: #721c24; }
        .bar-bg { background: #e0e6ed; border-radius: 6px; height: 22px; overflow: hidden; }
        .bar-fill {
            height: 100%; border-radius: 6px; display: flex; align-items: center;
            padding-left: 8px; font-size: 0.78em; font-weight: 600; color: white; min-width: 28px;
            transition: width 0.6s ease;
        }
        .bar-correct { background: linear-gradient(90deg, #2d8c2a, #6abf40); }
        .bar-incorrect { background: linear-gradient(90deg, #c0392b, #e74c3c); }
        .q-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .q-label { flex: 0 0 200px; font-size: 0.88em; color: #555; }
        .q-bar { flex: 1; }
        .q-pct { flex: 0 0 50px; text-align: right; font-weight: 600; font-size: 0.9em; }
        .empty-state { text-align: center; padding: 60px 20px; color: #888; }
        .empty-state p { font-size: 1.1em; margin-bottom: 16px; }
        .btn-danger {
            background: #c0392b; color: white; border: none; padding: 10px 24px;
            border-radius: 8px; cursor: pointer; font-size: 0.9em; font-weight: 600;
        }
        .btn-danger:hover { background: #a93226; }
        .actions { text-align: right; margin-top: 12px; }
        .sort-btn {
            background: none; border: none; cursor: pointer; font-weight: 600;
            color: #2d5016; font-size: 0.92em;
        }
        .sort-btn:hover { text-decoration: underline; }
        @media (max-width: 600px) {
            .container { padding: 12px; }
            header { padding: 20px 14px; }
            .q-label { flex: 0 0 120px; font-size: 0.8em; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            table { font-size: 0.82em; }
            th, td { padding: 8px 6px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>EMM1 - Statistiky testu</h1>
            <p>Dashboard pro vyučujícího &bull; Cvičení 5 &bull; CZU</p>
        </header>
        <div class="nav-links">
            <a href="index.html">Zpět na test</a>
        </div>
        <div id="content"></div>
    </div>

<script>
const questionLabels = [
    "Cíl úlohy LP",
    "Kapacita mlékárny",
    "Mléko na jahod. jogurt",
    "Nejvyšší cena za balení",
    "Podmínka min. jogurtů",
    "Proměnná d1",
    "Proměnné d2 a p2",
    "Penalizace umělé prom.",
    "Optimální hodnota z",
    "Vektor báz. řešení",
    "Kritérium optimality",
    "Podmínky duálu",
    "Stínová cena y1",
    "Věta o dualitě",
    "Nerovnosti v duálu"
];

let sortCol = 'date';
let sortDir = 'desc';

function render() {
    const history = JSON.parse(localStorage.getItem('emm1_quiz_results') || '[]');
    const content = document.getElementById('content');

    if (history.length === 0) {
        content.innerHTML = `
            <div class="card empty-state">
                <p>Zatím žádné výsledky.</p>
                <p>Studenti musí nejprve absolvovat <a href="index.html" style="color:#4a8c2a;font-weight:600;">test</a>.</p>
            </div>`;
        return;
    }

    const totalStudents = history.length;
    const avgScore = (history.reduce((s, r) => s + r.pct, 0) / totalStudents).toFixed(1);
    const bestScore = Math.max(...history.map(r => r.pct));
    const worstScore = Math.min(...history.map(r => r.pct));
    const passed = history.filter(r => r.pct >= 70).length;
    const median = (() => {
        const sorted = history.map(r => r.pct).sort((a, b) => a - b);
        const mid = Math.floor(sorted.length / 2);
        return sorted.length % 2 ? sorted[mid] : ((sorted[mid - 1] + sorted[mid]) / 2).toFixed(0);
    })();

    // Per-question stats
    const qStats = questionLabels.map((label, qi) => {
        let correct = 0, total = 0;
        history.forEach(r => {
            if (r.answers && r.answers[qi]) {
                total++;
                if (r.answers[qi].correct) correct++;
            }
        });
        return { label, correct, total, pct: total > 0 ? Math.round((correct / total) * 100) : 0 };
    });

    let html = '';

    // Summary
    html += `<div class="card">
        <h2>Celkový přehled</h2>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-value">${totalStudents}</div>
                <div class="stat-label">Studentů</div>
            </div>
            <div class="stat-box">
                <div class="stat-value">${avgScore}%</div>
                <div class="stat-label">Průměr</div>
            </div>
            <div class="stat-box">
                <div class="stat-value">${median}%</div>
                <div class="stat-label">Medián</div>
            </div>
            <div class="stat-box">
                <div class="stat-value">${bestScore}%</div>
                <div class="stat-label">Nejlepší</div>
            </div>
            <div class="stat-box">
                <div class="stat-value">${worstScore}%</div>
                <div class="stat-label">Nejhorší</div>
            </div>
            <div class="stat-box">
                <div class="stat-value">${passed}/${totalStudents}</div>
                <div class="stat-label">Úspěšných (70%+)</div>
            </div>
        </div>
    </div>`;

    // Per-question success
    const sortedQ = [...qStats].sort((a, b) => a.pct - b.pct);
    html += `<div class="card">
        <h2>Úspěšnost podle otázek (od nejtěžší)</h2>`;
    sortedQ.forEach((qs, i) => {
        const color = qs.pct >= 70 ? 'bar-correct' : 'bar-incorrect';
        const origIdx = qStats.indexOf(qs);
        html += `<div class="q-row">
            <div class="q-label">${origIdx + 1}. ${qs.label}</div>
            <div class="q-bar"><div class="bar-bg"><div class="bar-fill ${color}" style="width:${Math.max(qs.pct, 5)}%">${qs.correct}/${qs.total}</div></div></div>
            <div class="q-pct">${qs.pct}%</div>
        </div>`;
    });
    html += `</div>`;

    // Student table
    const sorted = [...history].sort((a, b) => {
        let va, vb;
        if (sortCol === 'name') { va = (a.name || '').toLowerCase(); vb = (b.name || '').toLowerCase(); }
        else if (sortCol === 'score') { va = a.pct; vb = b.pct; }
        else { va = a.date; vb = b.date; }
        if (va < vb) return sortDir === 'asc' ? -1 : 1;
        if (va > vb) return sortDir === 'asc' ? 1 : -1;
        return 0;
    });

    const arrow = (col) => sortCol === col ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';

    html += `<div class="card">
        <h2>Výsledky studentů</h2>
        <table>
            <thead><tr>
                <th>#</th>
                <th><button class="sort-btn" onclick="setSort('name')">Jméno${arrow('name')}</button></th>
                <th><button class="sort-btn" onclick="setSort('score')">Skóre${arrow('score')}</button></th>
                <th>%</th>
                <th>Hodnocení</th>
                <th><button class="sort-btn" onclick="setSort('date')">Čas${arrow('date')}</button></th>
            </tr></thead>
            <tbody>`;
    sorted.forEach((r, i) => {
        const d = new Date(r.date);
        const dateStr = d.toLocaleDateString('cs-CZ') + ' ' + d.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });
        const badgeClass = r.pct >= 90 ? 'badge-great' : r.pct >= 70 ? 'badge-great' : r.pct >= 50 ? 'badge-ok' : 'badge-bad';
        const badgeText = r.pct >= 90 ? 'Vynikající' : r.pct >= 70 ? 'Dobře' : r.pct >= 50 ? 'Průměrně' : 'Nedostatečně';
        html += `<tr>
            <td>${i + 1}</td>
            <td><strong>${r.name || 'Neznámý'}</strong></td>
            <td>${r.score}/${r.total}</td>
            <td>${r.pct}%</td>
            <td><span class="badge ${badgeClass}">${badgeText}</span></td>
            <td>${dateStr}</td>
        </tr>`;
    });
    html += `</tbody></table>
        <div class="actions">
            <button class="btn-danger" onclick="clearHistory()">Smazat všechny výsledky</button>
        </div>
    </div>`;

    content.innerHTML = html;
}

function setSort(col) {
    if (sortCol === col) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
        sortCol = col;
        sortDir = col === 'score' ? 'desc' : 'asc';
    }
    render();
}

function clearHistory() {
    if (confirm('Opravdu smazat všechny výsledky studentů?')) {
        localStorage.removeItem('emm1_quiz_results');
        render();
    }
}

render();
</script>
</body>
</html>
